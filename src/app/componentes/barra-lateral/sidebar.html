<nav class="sidebar-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span>Página Principal</span>
    </a>
    <a routerLink="/usuarios" routerLinkActive="active" class="nav-item">
        <span>Manejo de usuarios</span>
    </a>
</nav>

<div class="sidebar-title" style="margin-top: 2rem;">Mis Tableros</div>
<div class="sidebar-nav">
    @for (tablero of tableros; track tablero.id) {
    <div class="nav-item">
        <a [routerLink]="['/board', tablero.id]" routerLinkActive="active"
            style="text-decoration: none; color: inherit; flex: 1; display: flex; align-items: center; gap: 0.5rem;">
            <span [style.background-color]="tablero.fondo"
                style="width: 12px; height: 12px; border-radius: 4px; display: inline-block;"></span>
            {{ tablero.nombre }}
        </a>
        <button class="delete-btn-mini" (click)="eliminarTablero(tablero.id, $event)">×</button>
    </div>
    }
    <button class="btn-add-sidebar" (click)="showAddModal = true"
        style="margin-top: 1.5rem; background: rgba(99, 102, 241, 0.1); border-color: var(--accent-primary); color: #818cf8;">
        + Nuevo Tablero
    </button>
</div>

<!-- Add Board Modal (Copied from Board) -->
@if (showAddModal) {
<div class="modal-backdrop-custom" (click)="showAddModal = false">
    <div class="modal-custom" (click)="$event.stopPropagation()">
        <h2 class="section-title" style="font-size: 1.75rem; margin-bottom: 2rem;">Crear nuevo tablero</h2>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Nombre del
                proyecto</label>
            <input type="text" [(ngModel)]="nuevoNombre" placeholder="P. ej. Lanzamiento App" class="input-custom">
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label
                style="font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Descripción</label>
            <textarea [(ngModel)]="nuevoDesc" placeholder="Breve descripción de los objetivos..." class="input-custom"
                style="height: 120px; resize: none;"></textarea>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label style="font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Color de
                fondo</label>
            <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem;">
                <input type="color" [(ngModel)]="nuevoColor"
                    style="flex: 1; height: 50px; border: none; padding: 0; background: transparent; cursor: pointer;">
                <div [style.background]="nuevoColor"
                    style="width: 50px; height: 50px; border-radius: 12px; border: 4px solid var(--bg-surface); box-shadow: 0 0 0 1px var(--border-color);">
                </div>
            </div>
        </div>

        <div class="modal-actions-custom">
            <button class="btn-secondary-custom" (click)="showAddModal = false">Descartar</button>
            <button class="btn-primary-custom" (click)="crearTablero()">Crear proyecto</button>
        </div>
    </div>
</div>
}
