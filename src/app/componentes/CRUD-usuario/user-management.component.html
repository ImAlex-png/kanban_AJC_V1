<div class="main-content">
    <h2 class="section-title">Gestión de Usuarios</h2>

    <div class="user-layout">
        <!-- Form Section -->
        <div class="card form-card">
            <h3>Añadir Nuevo Usuario</h3>
            <form (submit)="crearUsuario($event)">
                <div class="form-group">
                    <label>ID</label>
                    <input type="number" [(ngModel)]="nuevoId" name="id" class="input-custom" placeholder="Ej: 101"
                        required>
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" [(ngModel)]="nuevoNombre" name="nombre" class="input-custom" placeholder="Nombre"
                        required>
                </div>
                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" [(ngModel)]="nuevoApellido" name="apellido" class="input-custom"
                        placeholder="Apellidos" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" [(ngModel)]="nuevoEmail" name="email" class="input-custom"
                        placeholder="correo@ejemplo.com" required>
                </div>

                <button type="submit" class="btn-primary-custom" style="width: 100%; margin-top: 1.5rem;">
                    Crear Usuario
                </button>
            </form>
        </div>

        <!-- List Section -->
        <div class="card list-card">
            <h3>Usuarios Registrados</h3>
            <div class="users-list">
                <div *ngFor="let user of usuarios" class="user-item">
                    <div class="user-info">
                        <div class="user-avatar">{{ user.nombre.charAt(0) }}{{ user.apellido.charAt(0) }}</div>
                        <div class="user-details">
                            <h4>{{ user.nombre }} {{ user.apellido }}</h4>
                            <p class="user-email">{{ user.email }} (ID: {{ user.id }})</p>
                        </div>
                    </div>
                    <button class="delete-btn-mini" (click)="eliminarUsuario(user.id)" title="Eliminar">
                        🗑️
                    </button>
                </div>
                <p *ngIf="usuarios.length === 0" class="empty-state">No hay usuarios registrados.</p>
            </div>
        </div>
    </div>
</div>
